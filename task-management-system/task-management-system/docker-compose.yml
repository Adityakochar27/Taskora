# One-command full stack: web + api + mongo. Bring it up with:
#
#   docker compose up --build
#
# Then browse to http://localhost:8080. The web container fronts the API at
# /api/ via nginx, so no CORS gymnastics in the browser.
#
# To seed demo data after first boot:
#   docker compose exec api npm run seed
#
# For a pure dev workflow with hot reload, see docker-compose.dev.yml.

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: ./server
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/taskflow
      JWT_SECRET: ${JWT_SECRET:-please_change_me_in_production}
      JWT_EXPIRES_IN: 7d
      ADMIN_SIGNUP_KEY: ${ADMIN_SIGNUP_KEY:-change_me_only_used_for_first_admin}
      CLIENT_ORIGIN: http://localhost:8080
      LOG_LEVEL: info
      # Optional integrations — pass through from host env if set.
      FIREBASE_SERVICE_ACCOUNT: ${FIREBASE_SERVICE_ACCOUNT:-}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_WHATSAPP_FROM: ${TWILIO_WHATSAPP_FROM:-}
      TWILIO_WEBHOOK_URL: ${TWILIO_WEBHOOK_URL:-}
    volumes:
      - api_uploads:/app/uploads
    ports:
      - "5000:5000"

  web:
    build:
      context: ./client
      args:
        VITE_API_BASE: /api
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "8080:80"

volumes:
  mongo_data:
  api_uploads:
